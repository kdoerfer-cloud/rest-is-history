g. Join Tom and Dominic as they explore McCarthyism, American anti-communist hysteria, and Oppenheimer’s fall from grace.\n\n*The Rest Is History Live Tour 2023*:\n","audio":"https://pdst.fm/e/traffic.megaphone.fm/GLT1594914557.mp3?updated=1729782470","apple":"podcasts://podcasts.apple.com/us/podcast/episode/id1537788786?i=1000650150033","link":"","cats":["World War II","Science & Medicine","Religion & Christianity"],"series":"Oppenheimer"},{"title":"343: Oppenheimer: The Father of the Atom Bomb (Part 1)","num":"343","displayDate":"Jun 22, 2023","rawDate":"Thu, 22 Jun 2023 01:00:00 -0000","duration":"3308","desc":"“Now I am become Death, the destroyer of worlds.” This was J. Robert Oppenheimer’s reaction to the first atomic bomb test in July 1945, marking the beginning of the nuclear age. Oppenheimer, an American theoretical physicist of Jewish-German descent, was in charge of the American nuclear project, leading the Los Alamos laboratory and tasked with developing “the bomb” in 1943, following his involvement in the Manhattan Project. Join Tom and Dominic as they delve into the life of the man behind “t","audio":"https://pdst.fm/e/traffic.megaphone.fm/GLT9202576882.mp3?updated=1729782450","apple":"podcasts://podcasts.apple.com/us/podcast/episode/id1537788786?i=1000617838413","link":"","cats":["World War II","Science & Medicine"],"series":"Oppenheimer"},{"title":"342: The Trials of Oscar Wilde: Downfall and Prison (Part 2)","num":"342","displayDate":"Jun 19, 2023","rawDate":"Mon, 19 Jun 2023 01:00:00 -0000","duration":"2741","desc":"It’s 1895, and with the libel case brought against the Marquess of Queensbury having collapsed, Oscar Wilde is now arrested and charged with committing acts of “gross indecency”. With former lovers, hotel servants and chambermaids lining up to give evidence, and the evening papers, night after night full of scandalous allegations, turning the general public against him, Wilde must now face a trial brought about through his own poor judg 23*:\n\nT","audio":"https://pdst.fm/e/traffic.megaphone.fm/GLT9152886733.mp3?updated=1693983381","apple":"podcasts://podcasts.apple.com/us/podcast/episode/id1537788786?i=1000612545188","link":"","cats":["Religion & Christianity","North America"],"series":null},{"title":"330: Herodotus: The Birth of History","num":"330","displayDate":"May 08, 2023","rawDate":"Mon, 08 May 2023 01:00:00 -0000","duration":"3225","desc":"Born on the Western edge of an empire that stretched all the way to India, Herodotus was a Greek historian of the 5th century BC. His major work The Histories, a long and detailed account of the Greco-Persian Wars and the cultures of the ancient world, is considered the founding work of History in Western literature. Herodotus was known for his thorough research, his use of eyewitness accounts, and his engaging storytelling style, and was not impervious to feuding with other historians… Join Tom","audio":"https://pdst.fm/e/traffic.megaphone.fm/GLT7158094581.mp3?updated=1693983395","apple":"podcasts://podcasts.apple.com/us/podcast/episode/id1537788786?i=1000612097634","link":"","cats":["Ancient Greece"],"series":null},{"title":"329: Coronations: Chaos, Ceremony and Empire (Part 3)","num":"329","displayDate":"May 06, 2023","rawDate":"Sat, 06 May 2023 01:00:00 -0000","duration":"3203","desc":"What was the most calamitous coronation of all time? Which ceremony does Tom think is the most boring topic he's ever discussed on the podcast? How will Charles III's big day compare to that of his ancestors?\n\nIn the third and final episode, Tom and Dominic answer all these questions as they explore the most recent coronations in British history.\n\n*The Rest Is History Live Tour 2023*:\n\nTom and Dominic are back on tour this autumn! See them live in London, New Zealand, and Australia!\n\nBuy your ti","audio":"https://pdst.fm/e/traffic.megaphone.fm/GLT8755026279.mp3?updated=1729782776","apple":"podcasts://podcasts.apple.com/us/podcast/episode/id1537788786?i=10006116 brook and Tom Holland discuss what might have been.\nLearn more about your ad choices. Visit podcastchoices.com/adchoices","audio":"https://pdst.fm/e/traffic.megaphone.fm/GLT7767131043.mp3?updated=1706626391","apple":"podcasts://podcasts.apple.com/us/podcast/episode/id1537788786?i=1000512989650","link":"","cats":["Uncategorised"],"series":null},{"title":"31. The Second Reich","num":"31","displayDate":"Mar 11, 2021","rawDate":"Thu, 11 Mar 2021 03:00:00 -0000","duration":"3161","desc":"It emerged from the Prussian victory over France in 1870 and was destroyed by the First World War less than fifty years later. German historian Katja Hoyer joins Tom Holland and Dominic Sandbrook to discuss the short but explosive life of the German Second Reich.\nLearn more about your ad choices. Visit podcastchoices.com/adchoices","audio":"https://pdst.fm/e/traffic.megaphone.fm/GLT1008050219.mp3?updated=1706626369","apple":"podcasts://podcasts.apple.com/us/podcast/episode/id1537788786?i=1000512481824","link":"","cats":["British Empire & Colonial"],"series":null},{"title":"30. A Royal Row","num":"30","displayDate":"Mar 09, 2021","rawDate":"Tue, 09 Mar 2021 10:19:00 -0000","duration":"1808","desc":"With the British monarchy under intense scrutiny following an interview with Harry and Meghan conducted by Oprah Winfrey, Tom Holland and Dominic Sandbrook use the lens of history to analyse the significance of this event.\nLearn more about your ad choices. Visit podcastchoices.com/adchoices","audio":"https://pdst.fm/e/traffic.megaphone.fm/GLT5120507213.mp3?updated=1706626082","apple":"podcasts://podcasts.apple.com/us/podcast/episode/id1537788786?i=1000742330736","link":"","cats":["Royal History"],"series":null},{"title":"29. Americanisation","num":"29","displayDate":"Mar 08, 2021","rawDate":"Mon, 08 Mar 2021 02:00:00 -0000","duration":"2826","desc":"Has America taken over the world? Did the dollar and Hollywood enable the US to replace the British empire as the dominant international influencer? And is that power now waning?\nTom Holland and Dominic Sandbrook discuss Americanisation on the Rest is History.\nLearn more about your ad choices. Visit podcastchoices.com/adchoices","audio":"https://pdst.fm/e/traffic.megaphone.fm/GLT9683168458.mp3?updated=1706625456","apple":"podcasts://podcasts.apple.com/us/podcast/episode/id1537788786?i=1000512005076","link":"","cats":["Uncategorised"],"series":null},{"title":"28. The Kings of Comedy","num":"28","displayDate":"Mar 04, 2021","rawDate":"Thu, 04 Mar 2021 02:00:00 -0000","duration":"3414","desc":"Comedian Al Murray joins Tom Holland and Dominic Sandbrook to discuss the history of comedy as well as the funny side of history.\nHas comedy changed through time? When and why are we not allowed to laugh at events?\nAl Murray has made a living out of making people laugh, while also frequently placing history at the heart of his humour.\nLearn more about your ad choices. Visit podcastchoices.com/adchoices","audio":"https://pdst.fm/e/traffic.megaphone.fm/GLT5677879972.mp3?updated=1706625402","apple":"podcasts://podcasts.apple.com/us/podcast/episode/id1537788786?i=1000511507858","link":"","cats":["Uncategorised"],"series":null},{"title":"27. Tutankhamun","num":"27","displayDate":"Mar 01, 2021","rawDate":"Mon, 01 Mar 2021 02:00:00 -0000","duration":"2936","desc":"Tom Holland and Dominic Sandbrook ask why Tutankhamun remains the best known of the Egyptian pharaohs. They examine the discovery of the tomb by Howard Carter in 1922 and discuss Tutankhamun’s relatives, in particular his father Akhenaten.\nLearn more about your ad choices. Visit podcastchoices.com/adchoices","audio":"https://pdst.fm/e/traffic.megaphone.fm/GLT2697164979.mp3?updated=1706625372","apple":"podcasts://podcasts.apple.com/us/podcast/episode/id1537788786?i=1000511049272","link":"","cats":["Ancient Egypt"],"series":null},{"title":"26. Witches","num":"26","displayDate":"Feb 25, 2021","rawDate":"Thu, 25 Feb 2021 02:00:00 -0000","duration":"2978","desc":"Suzannah Lipscomb joins Tom Holland and Dominic Sandbrook to discuss the history of witches and witchcraft.\nWhy did society see witches as a threat and what is the modern equivalent of a witch hunt?\nLearn more about your ad choices. Visit podcastchoices.com/adchoices","audio":"https://pdst.fm/e/traffic.megaphone.fm/GLT8850594772.mp3?updated=1706624639","apple":"podcasts://podcasts.apple.com/us/podcast/episode/id1537788786?i=1000612545188","link":"","cats":["Religion & Christianity"],"series":null},{"title":"25. Empires","num":"25","displayDate":"Feb 22, 2021","rawDate":"Mon, 22 Feb 2021 02:00:00 -0000","duration":"3225","desc":"Is the age of empires over? And are they always a bad thing?\nDominic Sandbrook and Tom Holland explore empires through history, examining the modern assumption that nation statehood is always the better way.\nLearn more about your ad choices. Visit podcastchoices.com/adchoices","audio":"https://pdst.fm/e/traffic.megaphone.fm/GLT2896270746.mp3?updated=1706624614","apple":"podcasts://podcasts.apple.com/us/podcast/episode/id1537788786?i=1000510095777","link":"","cats":["British Empire & Colonial"],"series":null},{"title":"24. Sex in the City","num":"24","displayDate":"Feb 18, 2021","rawDate":"Thu, 18 Feb 2021 03:00:00 -0000","duration":"2878","desc":"Everything you wanted to know about sex in the 18th and 19th Century but were afraid to ask. Hallie Rubenhold, author of The Covent Garden Ladies and the multi-award winning The Five joins Tom Holland and Dominic Sandbrook to discuss this fascinating subject.\nLearn more about your ad choices. Visit podcastchoices.com/adchoices","audio":"https://pdst.fm/e/traffic.megaphone.fm/GLT9221135938.mp3?updated=1706624584","apple":"podcasts://podcasts.apple.com/us/podcast/episode/id1537788786?i=1000509617909","link":"","cats":["Uncategorised"],"series":null},{"title":"23. The 90s","num":"23","displayDate":"Feb 15, 2021","rawDate":"Mon, 15 Feb 2021 02:00:00 -0000","duration":"2844","desc":"Ecstasy, emails and economic stability. Dominic Sandbrook and Tom Holland discuss the 1990s, a decade which brought us Oasis, Tony Blair, Monica Lewinsky and Mr Blobby.\nLearn more about your ad choices. Visit podcastchoices.com/adchoices","audio":"https://pdst.fm/e/traffic.megaphone.fm/GLT8035489270.mp3?updated=1706624560","apple":"podcasts://podcasts.apple.com/us/podcast/episode/id1537788786?i=1000509030321","link":"","cats":["Modern (Post-1945)"],"series":null},{"title":"22. Weird Wars","num":"22","displayDate":"Feb 11, 2021","rawDate":"Thu, 11 Feb 2021 03:00:00 -0000","duration":"2777","desc":"The Rest is History brings you the top ten strangest conflicts of all time. Obscure, little-known, downright strange. Dominic Sandbrook and Tom Holland choose five each. \nLearn more about your ad choices. Visit podcastchoices.com/adchoices","audio":"https://pdst.fm/e/traffic.megaphone.fm/GLT2360848948.mp3?updated=1706624535","apple":"podcasts://podcasts.apple.com/us/podcast/episode/id1537788786?i=1000508541525","link":"","cats":["Uncategorised"],"series":null},{"title":"21. The History of the Future","num":"21","displayDate":"Feb 08, 2021","rawDate":"Mon, 08 Feb 2021 03:00:00 -0000","duration":"2560","desc":"What is history’s take on the future? Oracles, prophecies, apocalypse, scientific projection. Tom Holland and Dominic Sandbrook discuss them all.\nLearn more about your ad choices. Visit podcastchoices.com/adchoices","audio":"https://pdst.fm/e/traffic.megaphone.fm/GLT7103118075.mp3?updated=1706624511","apple":"podcasts://podcasts.apple.com/us/podcast/episode/id1537788786?i=1000508130777","link":"","cats":["Uncategorised"],"series":null},{"title":"20. China","num":"20","displayDate":"Feb 04, 2021","rawDate":"Thu, 04 Feb 2021 03:00:00 -0000","duration":"3532","desc":"Broadcaster and historian Michael Wood joins Tom Holland and Dominic Sandbrook to discuss the world’s oldest civilisation. What were the great moments in Chinese history and why do the Opium Wars still feature so prominently in the modern Chinese school syllabus? The birth of the Chinese Communist Party and the complicated legacy of Chairman Mao all feature.\nLearn more about your ad choices. Visit podcastchoices.com/adchoices","audio":"https://pdst.fm/e/traffic.megaphone.fm/GLT4329327216.mp3?updated=1706624488","apple":"podcasts://podcasts.apple.com/us/podcast/episode/id1537788786?i=1000507652890","link":"","cats":["East Asia"],"series":null},{"title":"19. King Arthur","num":"19","displayDate":"Feb 01, 2021","rawDate":"Mon, 01 Feb 2021 03:00:00 -0000","duration":"3091","desc":"It remains the most romantic historical story of all time, but is the legend of King Arthur a myth? Was he even English? And will he rise again when the country needs him most?\nTom Holland and Dominic Sandbrook take their places at the round table.\nLearn more about your ad choices. Visit podcastchoices.com/adchoices","audio":"https://pdst.fm/e/traffic.megaphone.fm/GLT1076701162.mp3?updated=1706624461","apple":"podcasts://podcasts.apple.com/us/podcast/episode/id1537788786?i=1000507241840","link":"","cats":["Medieval"],"series":null},{"title":"18. The North South Divide","num":"18","displayDate":"Jan 28, 2021","rawDate":"Thu, 28 Jan 2021 04:00:00 -0000","duration":"3307","desc":"England has long been divided by an invisible line somewhere north of Watford and south of the Mersey.\n\nBut do northerners really have more in common with Scots and Welsh people than their fellow Englishmen in London?\n\nDan Jackson, author of The Northumbrians and a former advisor to Cheryl Cole, joins southerner Tom Holland and midlander Dominic Sandbrook to try and decide if we should eat lunch then dinner, or dinner then tea.\nLearn more about your ad choices. Visit podcastchoices.com/adchoices","audio":"https://pdst.fm/e/traffic.megaphone.fm/GLT3709184192.mp3?updated=1706624437","apple":"podcasts://podcasts.apple.com/us/podcast/episode/id1537788786?i=1000506825845","link":"","cats":["Uncategorised"],"series":null},{"title":"17. Fascism","num":"17","displayDate":"Jan 25, 2021","rawDate":"Mon, 25 Jan 2021 03:00:00 -0000","duration":"2968","desc":"What is fascism and where did it come from? No one admits to being a fascist yet it continues to be a term of abuse hurled on a regular basis. Tom Holland and Dominic Sandbrook discuss the history of this most unacceptable of political models.\nLearn more about your ad choices. Visit podcastchoices.com/adchoices","audio":"https://pdst.fm/e/traffic.megaphone.fm/GLT5738760220.mp3?updated=1706624415","apple":"podcasts://podcasts.apple.com/us/podcast/episode/id1537788786?i=1000506443804","link":"","cats":["Uncategorised"],"series":null},{"title":"16. Pompeii","num":"16","displayDate":"Jan 21, 2021","rawDate":"Thu, 21 Jan 2021 02:00:00 -0000","duration":"3089","desc":"Pompeii\n\nWhy does Pompeii continue to hold such a fascination for so many people? And which secrets are still to be uncovered from beneath the ashes? Dr Sophie Hay, a leading expert on the ruined Italian city, joins Tom Holland and Dominic Sandbrook to answer lots of listener questions.\nLearn more about your ad choices. Visit podcastchoices.com/adchoices","audio":"https://pdst.fm/e/traffic.megaphone.fm/GLT3349011345.mp3?updated=1706624389","apple":"podcasts://podcasts.apple.com/us/podcast/episode/id1537788786?i=1000505995834","link":"","cats":["Ancient Rome"],"series":null},{"title":"15. Walls and Borders","num":"15","displayDate":"Jan 18, 2021","rawDate":"Mon, 18 Jan 2021 02:00:00 -0000","duration":"2760","desc":"From the Great Wall of China to the Berlin Wall, history is littered with the building of barriers aimed at keeping people out, and sometimes in. Do they work? Are they ever a good thing? Tom Holland and Dominic Sandbrook climb walls and explore borders as they investigate the history of separation. \nLearn more about your ad choices. Visit podcastchoices.com/adchoices","audio":"https://pdst.fm/e/traffic.megaphone.fm/GLT1636005045.mp3?updated=1706624363","apple":"podcasts://podcasts.apple.com/us/podcast/episode/id1537788786?i=1000505599612","link":"","cats":["Uncategorised"],"series":null},{"title":"14. Historical Fiction","num":"14","displayDate":"Jan 11, 2021","rawDate":"Mon, 11 Jan 2021 03:00:00 -0000","duration":"3569","desc":"Is the author’s responsibility to the quality of the novel or the truth of history? What makes a great historical novel and which authors have contributed to our understanding of history. Tom Holland and Dominic Sandbrook range across literature in search of the best of historical fiction.\nLearn more about your ad choices. Visit podcastchoices.com/adchoices","audio":"https://pdst.fm/e/traffic.megaphone.fm/GLT2461510190.mp3?updated=1706624341","apple":"podcasts://podcasts.apple.com/us/podcast/episode/id1537788786?i=1000504927397","link":"","cats":["Uncategorised"],"series":null},{"title":"13. Stephen Fry and Troy","num":"13","displayDate":"Jan 07, 2021","rawDate":"Thu, 07 Jan 2021 03:00:00 -0000","duration":"3795","desc":"Stephen Fry is our guest on The Rest is History as he tells Tom Holland and Dominic Sandbrook about his enduring fascination with the Greek myths.\nLearn more about your ad choices. Visit podcastchoices.com/adchoices","audio":"https://pdst.fm/e/traffic.megaphone.fm/GLT5875934078.mp3?updated=1706624317","apple":"podcasts://podcasts.apple.com/us/podcast/episode/id1537788786?i=1000504574510","link":"","cats":["Ancient Greece"],"series":null},{"title":"12. Conspiracy Theories","num":"12","displayDate":"Jan 04, 2021","rawDate":"Mon, 04 Jan 2021 03:00:00 -0000","duration":"2869","desc":"History is littered with conspiracy theories, from Popish plots to JFK’s assassination. But what makes people believe in them and how do they gain currency? As strange stories continue to swirl around the coronavirus vaccine, Tom Holland and Dominic Sandbrook examine conspiracy theories through the ages. Oh and Dominic finally solves the question of who did kill JFK.\nLearn more about your ad choices. Visit podcastchoices.com/adchoices","audio":"https://pdst.fm/e/traffic.megaphone.fm/GLT7580472793.mp3?updated=1706624294","apple":"podcasts://podcasts.apple.com/us/podcast/episode/id1537788786?i=1000504240261","link":"","cats":["Crime & Espionage"],"series":null},{"title":"11. Brexit","num":"11","displayDate":"Dec 28, 2020","rawDate":"Mon, 28 Dec 2020 03:00:00 -0000","duration":"2698","desc":"As Britain leaves the EU, Tom Holland and Dominic Sandbrook look at the best & worst comparisons from history that have been made to Brexit. \nLearn more about your ad choices. Visit podcastchoices.com/adchoices","audio":"https://pdst.fm/e/traffic.megaphone.fm/GLT9171248177.mp3?updated=1706624268","apple":"podcasts://podcasts.apple.com/us/podcast/episode/id1537788786?i=1000503654136","link":"","cats":["Modern (Post-1945)"],"series":null},{"title":"10. Christmas","num":"10","displayDate":"Dec 21, 2020","rawDate":"Mon, 21 Dec 2020 03:00:00 -0000","duration":"2371","desc":"Is Christmas an ancient ritual or was it invented by Dickens? Dominic Sandbrook and Tom Holland discuss the transformation of Christmas from public to private event and decide when it became a commercial rather than spiritual celebration.\nLearn more about your ad choices. Visit podcastchoices.com/adchoices","audio":"https://pdst.fm/e/traffic.megaphone.fm/GLT9855064623.mp3?updated=1706624220","apple":"podcasts://podcasts.apple.com/us/podcast/episode/id1537788786?i=1000741833897","link":"","cats":["Uncategorised"],"series":null},{"title":"9. Causes of the First World War","num":"9","displayDate":"Dec 14, 2020","rawDate":"Mon, 14 Dec 2020 03:00:00 -0000","duration":"2767","desc":"Whose fault was it? Does the question even make sense? Are wars always somebody's \"fault\"? Was it really the first global war? And should Britain have fought, or stayed out?\nLearn more about your ad choices. Visit podcastchoices.com/adchoices","audio":"https://pdst.fm/e/traffic.megaphone.fm/GLT8234482474.mp3?updated=1706624193","apple":"podcasts://podcast ur ad choices. Visit podcastchoices.com/adchoices","audio":"https://pdst.fm/e/traffic.megaphone.fm/GLT4742295987.mp3?updated=1706624040","apple":"podcasts://podcasts.apple.com/us/podcast/episode/id1537788786?i=1000499865084","link":"","cats":["Ancient Greece"],"series":null},{"title":"5. 1981","num":"5","displayDate":"Nov 16, 2020","rawDate":"Mon, 16 Nov 2020 03:00:00 -0000","duration":"2480","desc":"As a new series of The Crown arrives on Netflix, returning viewers to the 1980s, we look back at the year many Britons consider the worst in living memory.\nRocketing unemployment, riots in major cities and a country governed by the most divisive prime minister in post-war British history made 1981 a year to forget.\nAmidst the gloom was the wedding of Prince Charles to Lady Diana and the greatest Ashes fightback England cricket fans had ever seen.\nSo what can we learn from a closer analysis of 19","audio":"https://pdst.fm/e/traffic.megaphone.fm/GLT3026558838.mp3?updated=1706624000","apple":"podcasts://podcasts.apple.com/us/podcast/episode/id1537788786?i=1000498741601","link":"","cats":["Uncategorised"],"series":null},{"title":"4. We’re all so 17th Century","num":"4","displayDate":"Nov 09, 2020","rawDate":"Mon, 09 Nov 2020 02:15:00 -0000","duration":"2218","desc":"Plague, pestilence and statue smashing are back in business. Has 2020 turned out to be the 17th Century in disguise? And if so, has Boris Johnson become the new Oliver Cromwell, determined to crack down on the excesses of Christmas? Dominic Sandbrook and Tom Holland suggest things now are not as bad as we thought.\n\nTwitter: \n\n@TheRestHistory\n\n@holland_tom\n\n@dcsandbrook\nLearn more about your ad choices. Visit podcastchoices.com/adchoices","audio":"https://pdst.fm/e/traffic.megaphone.fm/GLT1251829896.mp3?updated=1706623967","apple":"podcasts://podcasts.apple.com/us/podcast/episode/id1537788786?i=1000497700317","link":"","cats":["Uncategorised"],"series":null},{"title":"3. Is Trump Caesar or Nixon?","nu let filtered = [...ALL];
let shown = 0;
const PAGE = 50;
let currentFilter = null;

function epRowHTML(ep, standalone) {
  const cls = standalone ? 'ep-row ep-row-standalone' : 'ep-row';
  const numBadge = ep.num ? '<span class="ep-r-num">#' + ep.num + '</span>' : '';
  return '<div class="' + cls + '">' +
    numBadge +
    '<span class="ep-r-title">' + ep.title + '</span>' +
    '<span class="ep-r-date">' + ep.displayDate + '</span>' +
    '<span class="ep-r-dur">' + ep.duration + '</span>' +
    (ep.apple ? '<a class="ep-r-apple" href="' + ep.apple + '" target="_blank" title="Open in Apple Podcasts">&#127822;</a>' : '') +
    '<a class="ep-r-play" href="' + ep.audio + '" target="_blank" title="Play / Download">&#9654;</a>' +
  '</div>';
}

function render(reset) {
  if (reset) { shown = 0; document.getElementById('episodes').innerHTML = ''; }
  const slice = filtered.slice(shown, shown + PAGE);
  const container = document.getElementById('episodes');
  slice.forEach(ep => {
    const div = document.createElement('div');
    div.className = 'episode';
    const numBadge = ep.num ? '<span class="ep-num">#' + ep.num + '</span>' : '';
    const tags = ep.cats.filter(c => c !== 'Uncategorised')
      .map(c => '<span class="ep-tag" data-topic="' + c + '">' + c + '</span>').join('');
    const seriesTag = ep.series ? '<span class="ep-tag" data-series="' + ep.series.replace(/"/g,'&quot;') + '" style="background:#e8ddd2;font-weight:600">' + ep.series + '</span>' : '';
    div.innerHTML =
      '<div class="ep-header"><span class="ep-title">' + ep.title + '</span>' + numBadge + '</div>' +
      '<div class="ep-meta"><span>' + ep.displayDate + '</span>' + (ep.duration ? '<span>' + ep.duration + '</span>' : '') + '</div>' +
      (tags || seriesTag ? '<div class="ep-tags">' + seriesTag + tags + '</div>' : '') +
      '<div class="ep-actions">' +
        (ep.apple ? '<a class="btn btn-apple" href="' + ep.apple + '" target="_blank">&#127822; Apple Podcasts</a>' : '') +
        '<a class="btn btn-play" href="' + ep.audio + '" target="_blank">&#9654; Play</a>' +
        (ep.desc ? '<button class="btn-toggle">&hellip; Details</button>' : '') +
      '</div>' +
      (ep.desc ? '<div class="ep-desc">' + ep.desc + '</div>' : '');
    container.appendChild(div);
  });
  container.querySelectorAll('.btn-toggle').forEach(btn => {
    if (!btn._bound) { btn._bound = true; btn.addEventListener('click', function() { this.closest('.episode').querySelector('.ep-desc').classList.toggle('show'); }); }
  });
  container.querySelectorAll('.ep-tag[data-topic]').forEach(tag => {
    if (!tag._bound) { tag._bound = true; tag.addEventListener('click', function() { filterByTopic(this.dataset.topic); }); }
  });
  container.querySelectorAll('.ep-tag[data-series]').forEach(tag => {
    if (!tag._bound) { tag._bound = true; tag.addEventListener('click', function() { filterBySeries(this.dataset.series); }); }
  });
  shown += slice.length;
  document.getElementById('loadMore').style.display = shown >= filtered.length ? 'none' : 'block';
  document.getElementById('stats').textContent = 'Showing ' + Math.min(shown, filtered.length) + ' of ' + filtered.length + ' episodes';
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const sort = document.getElementById('sortOrder').value;
  filtered = ALL.filter(ep => {
    const matchesSearch = !q || ep.title.toLowerCase().includes(q) || (ep.desc && ep.desc.toLowerCase().includes(q)) || ep.cats.some(c => c.toLowerCase().includes(q));
    const matchesFilter = !currentFilter ||
      (currentFilter.type === 'topic' && ep.cats.includes(currentFilter.value)) ||
      (currentFilter.type === 'series' && ep.series === currentFilter.value);
    return matchesSearch && matchesFilter;
  });
  if (sort === 'oldest') filtered = [...filtered].reverse();
  else if (sort === 'number') filtered = [...filtered].sort((a, b) => (parseInt(b.num) || 0) - (parseInt(a.num) || 0));
  if (filtered.length === 0) {
    document.getElementById('episodes').innerHTML = '<div class="no-results">No episodes found.</div>';
    document.getElementById('loadMore').style.display = 'none';
    document.getElementById('stats').textContent = '0 results';
    shown = 0; return;
  }
  render(true);
}

function setFilter(type, value) {
  currentFilter = { type, value };
  document.getElementById('filterLabel').textContent = value;
  document.getElementById('activeFilter').classList.add('show');
  switchTab('all');
  applyFilters();
}
function filterByTopic(t) { setFilter('topic', t); }
function filterBySeries(s) { setFilter('series', s); document.getElementById('sortOrder').value = 'oldest'; applyFilters(); }
document.getElementById('clearFilter').onclick = function() {
  currentFilter = null;
  document.getElementById('activeFilter').classList.remove('show');
  applyFilters();
};

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.getElementById('browsePanel').classList.toggle('active', tab === 'browse');
  document.getElementById('seriesPanel').classList.toggle('active', tab === 'series');
  const showEps = tab === 'all' || currentFilter;
  document.getElementById('episodes').style.display = showEps ? 'block' : (tab !== 'all' ? 'none' : 'block');
  document.getElementById('loadMore').style.display = showEps && shown < filtered.length ? 'block' : 'none';
}
document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab)));

function buildTree() {
  const tree = document.getElementById('topicTree');
  TOPIC_TREE.forEach(era => {
    const eraTotal = era.subtopics.reduce((s, t) => s + t.count, 0);
    const li = document.createElement('li');
    li.className = 'tree-era';
    const eraBtn = document.createElement('button');
    eraBtn.className = 'era-toggle';
    eraBtn.innerHTML = '<span class="era-icon">' + era.icon + '</span><span>' + era.era + '</span><span class="era-count">' + eraTotal + ' episodes</span><span class="era-arrow">&#9654;</span>';
    const subUl = document.createElement('ul');
    subUl.className = 'subtopic-list';
    era.subtopics.forEach(sub => {
      const subLi = document.createElement('li');
      subLi.className = 'subtopic-item';
      const subBtn = document.createElement('button');
      subBtn.className = 'subtopic-toggle';
      subBtn.innerHTML = '<span class="subtopic-bullet"></span><span class="subtopic-name">' +
        (sub.label || sub.name) + '</span><span class="subtopic-count">' + sub.count +
        '</span><span class="subtopic-arrow">&#9654;</span>';
      subLi.appendChild(subBtn);
      const content = document.createElement('div');
      content.className = 'subtopic-content';
      if (sub.series && sub.series.length > 0) {
        sub.series.forEach(s => {
          const sRow = document.createElement('div');
          sRow.className = 'series-row';
          const sToggle = document.createElement('button');
          sToggle.className = 'series-toggle';
          sToggle.innerHTML = '<span class="s-icon">&#9654;</span><span class="s-name">' + s.name +
            '</span><span class="s-count">' + s.eps.length + ' parts</span>';
          sRow.appendChild(sToggle);
          const epsDiv = document.createElement('div');
          epsDiv.className = 'series-eps';
          const sortedEps = [...s.eps].sort((a, b) => b - a);
          sortedEps.forEach(idx => {
            epsDiv.insertAdjacentHTML('beforeend', epRowHTML(ALL[idx], false));
          });
          sRow.appendChild(epsDiv);
          sToggle.addEventListener('click', function(e) {
            e.stopPropagation();
            this.classList.toggle('open');
            epsDiv.classList.toggle('open');
          });
          content.appendChild(sRow);
        });
      }
      if (sub.standalone && sub.standalone.length > 0) {
        if (sub.series && sub.series.length > 0) {
          const label = document.createElement('div');
          label.className = 'standalone-label';
          label.textContent = 'Standalone episodes';
          content.appendChild(label);
        }
        sub.standalone.forEach(idx => {
          content.insertAdjacentHTML('beforeend', epRowHTML(ALL[idx], true));
        });
      }
      subLi.appendChild(content);
      subBtn.addEventListener('click', function() {
        this.classList.toggle('open');
        content.classList.toggle('open');
      });
      subUl.appendChild(subLi);
    });
    eraBtn.addEventListener('click', function() {
      this.classList.toggle('open');
      subUl.classList.toggle('open');
    });
    li.appendChild(eraBtn);
    li.appendChild(subUl);
    tree.appendChild(li);
  });
}

function buildSeries() {
  const tree = document.getElementById('seriesTree');
  SERIES_BY_ERA.forEach(era => {
    const totalEps = era.series.reduce((s, sr) => s + sr.eps.length, 0);
    const li = document.createElement('li');
    li.className = 'tree-era';
    const eraBtn = document.createElement('button');
    eraBtn.className = 'era-toggle';
    eraBtn.innerHTML = '<span class="era-icon">' + era.icon + '</span><span>' + era.era +
      '</span><span class="era-count">' + era.series.length + ' series &middot; ' + totalEps +
      ' episodes</span><span class="era-arrow">&#9654;</span>';
    const subUl = document.createElement('ul');
    subUl.className = 'subtopic-list';

    era.series.forEach(s => {
      const subLi = document.createElement('li');
      subLi.className = 'series-row';
      const sToggle = document.createElement('button');
      sToggle.className = 'series-toggle';
      sToggle.style.paddingLeft = '1.4rem';
      sToggle.innerHTML = '<span class="s-icon">&#9654;</span><span class="s-name">' + s.name +
        '</span><span class="s-count">' + s.eps.length + ' episodes</span>';
      subLi.appendChild(sToggle);

      const epsDiv = document.createElement('div');
      epsDiv.className = 'series-eps';
      const sortedEps = [...s.eps].sort((a, b) => b - a);
      sortedEps.forEach(idx => {
        epsDiv.insertAdjacentHTML('beforeend', epRowHTML(ALL[idx], false));
      });
      subLi.appendChild(epsDiv);

      sToggle.addEventListener('click', function(e) {
        e.stopPropagation();
        this.classList.toggle('open');
        epsDiv.classList.toggle('open');
      });
      subUl.appendChild(subLi);
    });

    eraBtn.addEventListener('click', function() {
      this.classList.toggle('open');
      subUl.classList.toggle('open');
    });
    li.appendChild(eraBtn);
    li.appendChild(subUl);
    tree.appendChild(li);
  });
}

document.getElementById('search').addEventListener('input', applyFilters);
document.getElementById('sortOrder').addEventListener('change', applyFilters);
document.getElementById('loadMore').addEventListener('click', () => render(false));
buildTree();
buildSeries();
render(true);
</script>
